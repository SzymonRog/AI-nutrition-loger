<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Health Ledger - Meal Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#1a1a1a",
                        "secondary": "#2f4436",
                        "background": "#ffffff",
                        "surface": "#ffffff",
                        "surface-container": "#f4f4f4",
                        "on-surface": "#000000",
                        "on-surface-variant": "#666666",
                        "outline": "#000000",
                        "outline-variant": "#e0e0e0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0rem",
                        "lg": "0rem",
                        "xl": "0rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
        .high-contrast-border {
            border: 1px solid #000000;
        }
        .btn-active-state:active {
            transform: scale(0.98);
            background-color: #f0f0f0;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface">
<!-- TopAppBar -->
<header class="bg-white border-b border-black w-full top-0 px-6 py-4 sticky z-50">
<div class="flex justify-between items-center w-full max-w-2xl mx-auto">
<div class="w-8 h-8 bg-black flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" data-icon="person">person</span>
</div>
<button class="text-black hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-12 pb-32">
<!-- Header Section -->
<section class="mb-12">
<h2 class="text-4xl font-extrabold tracking-tighter mb-2 font-headline uppercase italic">Meal Hub</h2>
<p class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Journal nourishment instantly.</p>
</section>
<!-- High Contrast Bento Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Text Input -->
<button class="group flex flex-col items-center justify-center bg-white high-contrast-border aspect-square transition-all hover:bg-black hover:text-white btn-active-state">
<span class="material-symbols-outlined text-4xl mb-4" data-icon="edit_note">edit_note</span>
<span class="text-[10px] font-black tracking-[0.3em] uppercase">ABC</span>
</button>
<!-- Photo Input -->
<button class="group flex flex-col items-center justify-center bg-white high-contrast-border aspect-square transition-all hover:bg-black hover:text-white btn-active-state">
<span class="material-symbols-outlined text-4xl mb-4" data-icon="photo_camera">photo_camera</span>
<span class="text-[10px] font-black tracking-[0.3em] uppercase">Cam</span>
</button>
<!-- Manual Input -->
<button class="group flex flex-col items-center justify-center bg-white high-contrast-border aspect-square transition-all hover:bg-black hover:text-white btn-active-state">
<span class="material-symbols-outlined text-4xl mb-4" data-icon="add">add</span>
<span class="text-[10px] font-black tracking-[0.3em] uppercase">Manual</span>
</button>
<!-- Database Input (Soon) -->
<div class="relative flex flex-col items-center justify-center bg-white border border-dashed border-neutral-300 aspect-square opacity-40 cursor-not-allowed">
<span class="material-symbols-outlined text-4xl mb-4" data-icon="database">database</span>
<span class="text-[10px] font-black tracking-[0.3em] uppercase">Soon</span>
</div>
</div>
<!-- Secondary Content Section -->
<section class="mt-16 space-y-4">
<div class="flex items-center justify-between border-b border-black pb-2">
<h3 class="text-[10px] font-black tracking-[0.2em] uppercase">Recent History</h3>
<span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</div>
<div class="space-y-2">
<!-- Entry 1 -->
<div class="flex items-center justify-between p-4 high-contrast-border bg-white">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-secondary flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="restaurant">restaurant</span>
</div>
<div>
<h4 class="text-sm font-bold uppercase tracking-tight">Garden Salad</h4>
<p class="text-[10px] text-on-surface-variant font-medium">12:30 PM • 320 KCAL</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1">check_circle</span>
</div>
<!-- Entry 2 -->
<div class="flex items-center justify-between p-4 high-contrast-border bg-white">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-black flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="coffee">coffee</span>
</div>
<div>
<h4 class="text-sm font-bold uppercase tracking-tight">Black Coffee</h4>
<p class="text-[10px] text-on-surface-variant font-medium">08:15 AM • 5 KCAL</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1">check_circle</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 py-4 bg-white border-t border-black pb-safe">
<button class="flex flex-col items-center justify-center text-black p-2 hover:opacity-50 transition-opacity">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-[9px] font-black uppercase tracking-tighter mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary text-white w-14 h-14 high-contrast-border -mt-8 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined" data-icon="add">add</span>
<span class="text-[9px] font-black uppercase tracking-tighter mt-0.5">Add</span>
</button>
<button class="flex flex-col items-center justify-center text-black p-2 hover:opacity-50 transition-opacity">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[9px] font-black uppercase tracking-tighter mt-1">Log</span>
</button>
<button class="flex flex-col items-center justify-center text-black p-2 hover:opacity-50 transition-opacity">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="text-[9px] font-black uppercase tracking-tighter mt-1">More</span>
</button>
</nav>
</body></html>
