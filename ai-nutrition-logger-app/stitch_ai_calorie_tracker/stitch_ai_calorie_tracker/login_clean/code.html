<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#dde4e5",
                        "surface-container-high": "#e4e9ea",
                        "on-secondary-fixed": "#2f4436",
                        "on-tertiary-fixed": "#454b48",
                        "on-secondary-container": "#415748",
                        "background": "#ffffff",
                        "primary-fixed-dim": "#d4d4d4",
                        "surface": "#ffffff",
                        "surface-container-low": "#f2f4f4",
                        "on-tertiary": "#f5faf6",
                        "tertiary-container": "#f0f5f1",
                        "on-background": "#000000",
                        "primary-dim": "#525252",
                        "tertiary-fixed": "#f0f5f1",
                        "error-dim": "#4e0309",
                        "error-container": "#fe8983",
                        "secondary-fixed": "#d0e9d5",
                        "on-error": "#fff7f6",
                        "on-primary-fixed": "#3f3f3f",
                        "tertiary-fixed-dim": "#e1e7e3",
                        "inverse-surface": "#0c0f0f",
                        "primary-fixed": "#e2e2e2",
                        "on-primary-container": "#525252",
                        "secondary": "#2f4436",
                        "on-tertiary-fixed-variant": "#626764",
                        "tertiary-dim": "#4f5452",
                        "secondary-dim": "#425849",
                        "outline": "#000000",
                        "surface-variant": "#f4f4f4",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#000000",
                        "on-primary-fixed-variant": "#5b5b5b",
                        "on-tertiary-container": "#575d5a",
                        "on-surface-variant": "#596061",
                        "secondary-fixed-dim": "#c2dbc7",
                        "surface-container": "#ebeeef",
                        "on-primary": "#ffffff",
                        "surface-bright": "#ffffff",
                        "primary-container": "#e2e2e2",
                        "surface-tint": "#000000",
                        "surface-dim": "#d3dbdd",
                        "on-secondary-fixed-variant": "#4b6151",
                        "secondary-container": "#d0e9d5",
                        "tertiary": "#5b605d",
                        "error": "#9f403d",
                        "on-error-container": "#752121",
                        "on-surface": "#000000",
                        "outline-variant": "#e2e2e2",
                        "inverse-primary": "#ffffff",
                        "inverse-on-surface": "#9c9d9d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-background flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-md space-y-12">
<header class="text-center space-y-4">
<h2 class="font-headline font-bold text-xs uppercase tracking-[0.3em] text-on-surface-variant">Sign In</h2>
<p class="text-on-surface-variant font-medium tracking-tight text-sm">Secure access to your health ledger.</p>
</header>
<div class="bg-surface border border-outline/10 p-8 md:p-12">
<form class="space-y-8" onsubmit="return false;">
<div class="space-y-2">
<label class="block font-label text-[10px] uppercase tracking-[0.2em] text-on-surface font-bold">Account Email</label>
<div class="relative group">
<input class="w-full bg-surface-variant/30 border border-outline-variant focus:ring-0 focus:border-secondary py-4 px-4 transition-all placeholder:text-on-surface-variant/40 text-on-surface" placeholder="email@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-[10px] uppercase tracking-[0.2em] text-on-surface font-bold">Security Key</label>
<div class="relative group">
<input class="w-full bg-surface-variant/30 border border-outline-variant focus:ring-0 focus:border-secondary py-4 px-4 transition-all placeholder:text-on-surface-variant/40 text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-4 flex flex-col space-y-6">
<button class="w-full bg-secondary text-on-secondary py-4 px-6 font-bold tracking-widest text-sm uppercase transition-all hover:bg-on-secondary-fixed active:scale-[0.98]" type="submit">
                        Open Ledger
                    </button>
<div class="flex items-center justify-between text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">
<a class="hover:text-secondary transition-colors" href="#">Forgot Credentials</a>
<a class="hover:text-secondary transition-colors" href="#">Create Account</a>
</div>
</div>
</form>
<div class="mt-12">
<div class="relative flex items-center justify-center mb-8">
<div class="border-t border-outline-variant w-full"></div>
<span class="bg-surface px-4 text-[10px] font-label uppercase tracking-widest text-on-surface-variant/60">External Access</span>
<div class="border-t border-outline-variant w-full"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center py-4 border border-outline-variant text-on-surface hover:bg-surface-variant/50 transition-all active:scale-[0.98] space-x-2">
<span class="material-symbols-outlined text-lg">login</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Google</span>
</button>
<button class="flex items-center justify-center py-4 border border-outline-variant text-on-surface hover:bg-surface-variant/50 transition-all active:scale-[0.98] space-x-2">
<span class="material-symbols-outlined text-lg">key</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Apple ID</span>
</button>
</div>
</div>
</div>
<footer class="text-center pt-8">
<p class="text-[10px] font-label uppercase tracking-[0.3em] text-on-surface-variant/40">v1.0.4 — Encrypted Entry</p>
</footer>
</div>
</main>
</body></html>
